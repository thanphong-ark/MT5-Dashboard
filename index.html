
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT5 Multi-Account Dashboard</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.css">
    <script type="text/javascript" charset="utf8" src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        :root {
            --bg-color: #1E130C;
            --text-gold: #FFD700;
            --panel-bg: #2A1A12;
            --win-green: #2E4C38;
            --loss-red: #4A2323;
            --border-color: #3D2616;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-gold);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px;
        }
        h1, h2, h3 { text-align: center; margin-bottom: 20px; }
        /* Tabs */
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); }
        .tab-btn {
            background-color: var(--panel-bg); color: #fff; border: 1px solid var(--border-color);
            padding: 10px 25px; cursor: pointer; font-size: 16px; font-weight: bold;
            transition: 0.3s;
        }
        .tab-btn:hover { background-color: #3d2616; }
        .tab-btn.active { background-color: var(--text-gold); color: var(--bg-color); border-bottom: none; }
        /* Layout Grid */
        .dashboard-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 1000px) { .dashboard-container { grid-template-columns: 1fr; } }
        .panel { background-color: var(--panel-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); }
        /* Overview Stats */
        .overview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-box { background-color: var(--bg-color); padding: 15px; text-align: center; border-radius: 5px; border: 1px solid var(--border-color); }
        .stat-val { font-size: 24px; font-weight: bold; margin-top: 10px; }
        /* Calendar */
        .calendar-controls { text-align: center; margin-bottom: 15px; }
        .calendar-controls select { background-color: var(--bg-color); color: var(--text-gold); padding: 8px; border: 1px solid var(--text-gold); border-radius: 4px; font-size: 16px; outline: none; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-header { text-align: center; font-weight: bold; padding: 10px 0; background-color: var(--bg-color); }
        .day-cell { min-height: 80px; padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); background-color: var(--bg-color); display: flex; flex-direction: column; justify-content: space-between;}
        .day-cell.empty { background-color: transparent; border: none; }
        .day-cell.win { background-color: var(--win-green); border-color: #4CAF50; }
        .day-cell.loss { background-color: var(--loss-red); border-color: #F44336; }
        .day-num { font-size: 12px; color: #aaa; text-align: left; }
        .day-data { text-align: center; font-size: 14px; }
        .day-data .profit { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        /* DataTables Custom CSS */
        table.dataTable { color: white; }
        table.dataTable thead th { border-bottom: 2px solid var(--text-gold); }
        table.dataTable tbody tr { background-color: var(--panel-bg); }
        table.dataTable tbody tr:nth-of-type(odd) { background-color: #24150F; }
        .dataTables_wrapper .dataTables_length, .dataTables_wrapper .dataTables_filter, .dataTables_wrapper .dataTables_info, .dataTables_wrapper .dataTables_processing, .dataTables_wrapper .dataTables_paginate { color: var(--text-gold); }
        /* Fix lỗi chữ đen tàng hình trong ô Tìm kiếm và ô Chọn số lượng */
        .dataTables_wrapper select, .dataTables_wrapper input { background-color: var(--bg-color); color: var(--text-gold); border: 1px solid var(--text-gold); border-radius: 4px; padding: 4px; outline: none; }
        .positive { color: #4CAF50; }
        .negative { color: #F44336; }
    </style>
</head>

it": -10.71, "win": 1, "loss": 3}}, "chart_dates": ["2026-06-28 06:21", "2026-06-29 04:30", "2026-06-29 05:03", "2026-06-29 05:15", "2026-06-29 05:28", "2026-06-29 05:45", "2026-06-29 06:17", "2026-06-29 08:30", "2026-06-29 08:42", "2026-06-29 11:15", "2026-06-29 11:41", "2026-06-29 14:15", "2026-06-29 14:31", "2026-06-30 06:30", "2026-06-30 06:58", "2026-06-30 11:30", "2026-06-30 11:37", "2026-06-30 12:45", "2026-06-30 14:05", "2026-06-30 14:45", "2026-06-30 15:09", "2026-07-01 06:30", "2026-07-01 08:12", "2026-07-01 17:15", "2026-07-01 17:35", "2026-07-02 05:00", "2026-07-02 05:03", "2026-07-02 05:45", "2026-07-02 06:56", "2026-07-02 12:45", "2026-07-02 13:01", "2026-07-02 15:00", "2026-07-02 15:06"], "chart_balances": [2000.0, 2000.0, 2046.6, 2046.6, 2017.26, 2017.26, 1995.5, 1995.5, 1996.52, 1996.52, 1973.9, 1973.9, 1954.35, 1954.35, 1932.95, 1932.95, 1908.07, 1908.07, 1957.47, 1957.47, 1932.03, 1932.03, 1975.67, 1975.67, 2016.33, 2016.33, 1995.93, 1995.93, 2048.91, 2048.91, 2026.47, 2026.47, 2005.62]}};
        let currentTab = Object.keys(ALL_DATA)[0]; // Mặc định chọn TK đầu tiên
        let dataTableInstance = null;
        // Khởi tạo
        function init() {
            renderTabs();
            switchTab(currentTab);
        }
        function renderTabs() {
            const tabsDiv = document.getElementById('tabs-container');
            tabsDiv.innerHTML = '';
            Object.keys(ALL_DATA).forEach(tk => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${tk === currentTab ? 'active' : ''}`;
                btn.innerText = tk;
                btn.onclick = () => switchTab(tk);
                tabsDiv.appendChild(btn);
            });
        }
        function switchTab(tk) {
            currentTab = tk;
            renderTabs(); // Cập nhật màu nút active
            const data = ALL_DATA[tk];
            // 1. Update Overview
            document.getElementById('stat-balance').innerText = data.overview.balance.toLocaleString('en-US');
            document.getElementById('stat-equity').innerText = data.overview.equity.toLocaleString('en-US');
            const p = document.getElementById('stat-profit');
            p.innerText = data.overview.total_profit.toLocaleString('en-US');
            p.className = `stat-val ${data.overview.total_profit >= 0 ? 'positive' : 'negative'}`;
            document.getElementById('stat-winrate').innerText = data.overview.win_rate + '%';
            // 2. Update Chart
            renderChart(data);
            // 3. Update Calendar Dropdown & Data
            populateMonthDropdown(data.daily);
            renderCalendar();
            // 4. Update Table
            renderTable(data.history);
        }
        function renderChart(data) {
            const trace = {
                x: data.chart_dates,
                y: data.chart_balances,
                type: 'scatter',
                mode: 'lines',
                line: {color: '#FFD700', width: 2}
            };
            const layout = {
                paper_bgcolor: '#2A1A12',
                plot_bgcolor: '#2A1A12',
                font: { color: '#FFD700' },
                margin: { t: 10, l: 50, r: 20, b: 40 },
                xaxis: { 
                    gridcolor: '#3D2616',
                    rangeselector: {
                        buttons: [
                            {count: 1, label: '1m', step: 'month', stepmode: 'backward'},
                            {count: 6, label: '6m', step: 'month', stepmode: 'backward'},
                            {step: 'all', label: 'All'}
                        ],
                        bgcolor: '#1E130C', activecolor: '#3D2616'
                    }
                },
                yaxis: { 
                    gridcolor: '#3D2616',
                    autorange: true
                }
            };
            Plotly.newPlot('chart-div', [trace], layout);
        }
        function populateMonthDropdown(dailyData) {
            const select = document.getElementById('month-selector');
            select.innerHTML = '';
            const months = new Set();
            Object.keys(dailyData).forEach(dateStr => {
                months.add(dateStr.substring(0, 7)); // YYYY-MM
            });
            // Nếu không có dữ liệu, thêm tháng hiện tại
            if(months.size === 0) {
                const now = new Date();
                months.add(`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2, '0')}`);
            }
            const sortedMonths = Array.from(months).sort().reverse();
            sortedMonths.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                // Format: Tháng 6/2026
                const parts = m.split('-');
                opt.innerText = `Tháng ${parseInt(parts[1])}/${parts[0]}`;
                select.appendChild(opt);
            });
        }
        function renderCalendar() {
            const select = document.getElementById('month-selector');
            if(!select.value) return;
            const [year, month] = select.value.split('-').map(Number);
            const dailyData = ALL_DATA[currentTab].daily;
            const body = document.getElementById('calendar-body');
            body.innerHTML = '';
            const firstDay = new Date(year, month - 1, 1);
            const lastDay = new Date(year, month, 0);
            // JS getDay(): 0 là CN, 1 là T2. Đổi để T2 là cột 1, CN là cột 7
            let startDayOfWeek = firstDay.getDay() === 0 ? 7 : firstDay.getDay();
            // Ô trống đầu tháng
            for (let i = 1; i < startDayOfWeek; i++) {
                body.innerHTML += `<div class="day-cell empty"></div>`;
            }
            // Render các ngày
            for (let d = 1; d <= lastDay.getDate(); d++) {
                const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const data = dailyData[dateStr];
                let cellClass = "day-cell";
                let contentHTML = `<div class="day-num">${d}</div>`;
                if (data) {
                    if (data.profit > 0) cellClass += " win";
                    else if (data.profit < 0) cellClass += " loss";
                    contentHTML += `
                        <div class="day-data">
                            <div class="profit">${data.profit > 0 ? '+' : ''}${data.profit}</div>
                            <div style="font-size: 11px; color:#ddd">W:${data.win} | L:${data.loss}</div>
                        </div>
                    `;
                }
                body.innerHTML += `<div class="${cellClass}">${contentHTML}</div>`;
            }
        }
        function renderTable(historyData) {
            if (dataTableInstance) {
                dataTableInstance.destroy();
            }
            const tbody = document.querySelector('#history-table tbody');
            tbody.innerHTML = '';
            historyData.forEach(row => {
                const tr = document.createElement('tr');
                const profitClass = row.profit >= 0 ? 'positive' : 'negative';
                const changeClass = row.change >= 0 ? 'positive' : 'negative';
                tr.innerHTML = `
                    <td>${row.time_entry}</td>
                    <td>${row.time_close}</td>
                    <td>${row.symbol}</td>
                    <td>${row.type}</td>
                    <td>${row.volume}</td>
                    <td>${row.commission}</td>
                    <td>${row.swap}</td>
                    <td class="${profitClass}">${row.profit}</td>
                    <td class="${changeClass}">${row.change >= 0 ? '+' : ''}${row.change}%</td>
                `;
                tbody.appendChild(tr);
            });
            dataTableInstance = $('#history-table').DataTable({
                "pageLength": 10,
                "order": [[ 1, "desc" ]], // Mặc định sắp xếp theo cột Time Close (Cột thứ 2, chỉ số là 1) mới nhất lên đầu
                "language": {
                    "search": "Tìm kiếm:",
                    "lengthMenu": "Hiển thị _MENU_ lệnh",
                    "info": "Đang xem _START_ đến _END_ trong _TOTAL_ lệnh"
                }
            });
        }

        window.onload = init;
